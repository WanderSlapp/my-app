<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>WanderSlapp Market</title>
  <style>
  	body {
  margin: 0;
  padding: 0;
  background: #fff;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

/* Loader styles */
#loader {
  position: fixed;
  inset: 0;
  background: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  animation: fadeLoop 6s ease-in-out;
}
#loader img {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  background: transparent;
  animation: fadeLoop 6s ease-in-out;
  box-shadow: 0 0 12px rgba(0,0,0,0.1);
}
#loader p {
  margin-top: 12px;
  font-size: 20px;
  font-weight: bold;
  color: #0a7cff;
  animation: fadeLoop 6s ease-in-out;
}

/* Fade in/out animation */
@keyframes fadeLoop {
  0% { opacity: 0; }
  25% { opacity: 1; }
  50% { opacity: 0.3; }
  75% { opacity: 1; }
  100% { opacity: 0; }
}

/* Iframe styles */
#iframe,
#mainFrame {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: none;
}

</style>
</head>
<body>

<!-- Loader screen -->
<div id="loader">
  <img src="images/logo.jpeg" alt="Logo" />
  <p>FREE MARKET</p>
</div>

<!-- Embedded Netlify site -->
<iframe id="mainFrame" src="https://wanderslapp.dpdns.org/WIL/app/auth.php" loading="lazy"></iframe>

<script>
 setTimeout(() => {
  	document.getElementById("loader").style.display = "none";
  	document.getElementById("mainFrame").style.display = "block";
 }, 10000);
</script>
</body>
</html>
